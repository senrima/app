<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="author" content="Senrima Margasandy">
    <title>Akses > S-Tools ID</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <style> 
        body { font-family: 'Poppins', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-3 sm:p-6" 
      x-data="app()" x-init="init(); darkMode = localStorage.getItem('theme') === 'dark'; if(darkMode) document.documentElement.classList.add('dark');">

    <script>if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>

    <div class="fixed top-4 right-4 left-4 sm:left-auto sm:w-80 z-[100] flex flex-col gap-2 pointer-events-none">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible" x-transition.opacity.duration.300ms 
                 class="pointer-events-auto flex items-start gap-3 p-4 rounded-xl shadow-lg border backdrop-blur-md w-full"
                 :class="toast.type === 'error' ? 'bg-red-50/95 border-red-200 text-red-800 dark:bg-red-900/95 dark:border-red-800 dark:text-red-100' : 'bg-white/95 border-gray-200 text-gray-800 dark:bg-slate-800/95 dark:border-slate-700 dark:text-slate-100'">
                <div class="flex-1 text-sm font-medium break-words" x-text="toast.message"></div>
                <button @click="removeToast(toast.id)" class="text-gray-400 hover:text-gray-600 transition p-0.5">&times;</button>
            </div>
        </template>
    </div>

    <div class="w-full max-w-sm md:max-w-4xl bg-white dark:bg-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col md:grid md:grid-cols-2 transition-colors duration-300">
        
        <div class="hidden md:flex flex-col justify-between bg-gradient-to-br from-blue-600 to-indigo-700 p-10 lg:p-12 text-white">
            <div class="space-y-4">
                <h2 class="text-3xl font-bold tracking-tight">Akses Aplikasi</h2>
                <p class="text-blue-100 text-sm leading-relaxed">Keamanan data Anda adalah prioritas utama kami. Login untuk mengakses sistem kontrol yang andal dan aman.</p>
            </div>
            <div class="text-[11px] text-blue-200/70 mt-6">S-Tools ID Ekosistem Manajemen v3.0</div>
        </div>
        
        <div class="p-5 sm:p-8 md:p-10 lg:p-12 flex flex-col justify-center w-full">
            <div class="mb-5">
                <h1 class="text-xl sm:text-2xl font-bold text-gray-800 dark:text-slate-100 tracking-tight">Selamat Datang</h1>
                <p class="text-xs text-gray-400 dark:text-slate-400 mt-1">Silakan login untuk melanjutkan.</p>
            </div>
            
            <form @submit.prevent="login()" class="space-y-3.5">
                <div>
                    <label for="login-email" class="block text-[11px] font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider mb-1">Email</label>
                    <input x-model="loginData.email" id="login-email" type="email" autocomplete="email" 
                           class="w-full p-2.5 text-sm border border-gray-300 dark:border-slate-600 bg-transparent dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label for="login-password" class="block text-[11px] font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wider mb-1">Password</label>
                    <input x-model="loginData.password" id="login-password" type="password" autocomplete="current-password" 
                           class="w-full p-2.5 text-sm border border-gray-300 dark:border-slate-600 bg-transparent dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                
                <div class="flex items-center justify-between pt-1 pb-2">
                    <label class="flex items-center text-xs text-gray-600 dark:text-slate-300 cursor-pointer select-none">
                        <input id="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 dark:border-slate-600 dark:bg-slate-700 rounded transition cursor-pointer">
                        <span class="ml-2">Ingat Saya</span>
                    </label>
                    <a href="lupa-password.html" class="text-xs font-medium text-blue-600 dark:text-blue-400 hover:underline">Lupa password?</a>
                </div>
                
                <button type="submit" :disabled="isLoading" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-xl transition text-sm shadow-md flex justify-center items-center shrink-0">
                     <span x-show="!isLoading">Lanjutkan</span>
                     <svg x-show="isLoading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </form>
            
            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-gray-200 dark:border-slate-700"></div></div>
                <div class="relative flex justify-center text-[10px]"><span class="bg-white dark:bg-slate-800 px-2 text-gray-400 uppercase font-semibold tracking-wider">Atau</span></div>
            </div>
            
            <div id="g_id_onload"
                 data-client_id="140122260876-rea6sfsmcd32acgie6ko7hrr2rj65q6v.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="true">
            </div>
            <div class="w-full flex justify-center overflow-hidden max-w-full">
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left"
                     data-width="280">
                </div>
            </div>

            <div x-show="status.message" x-cloak class="mt-3 p-3 rounded-xl border-l-4 text-xs" 
                 :class="status.success ? 'bg-green-50 dark:bg-green-950/20 border-green-500 text-green-800 dark:text-green-300' : 'bg-red-50 dark:bg-red-950/20 border-red-500 text-red-800 dark:text-red-300'">
                <span class="font-medium" x-text="status.message"></span>
            </div>
            
            <div class="text-center mt-5 text-xs border-t border-gray-100 dark:border-slate-700/60 pt-3">
                <p class="text-gray-500 dark:text-slate-400">Belum punya akun? <a href="daftar.html" class="font-bold text-blue-600 dark:text-blue-400 hover:underline ml-0.5">Daftar di sini</a></p>
            </div>
        </div>
    </div>
    
    <script>
        if(!window.appToasts) window.appToasts = [];
    </script>
    <script src="js/main.js"></script>
</body>
</html>
