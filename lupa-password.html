<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Kata Sandi Baru - S-Tools ID</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; } [x-cloak] { display: none !important; } </style>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800" x-data="resetPasswordApp()" x-init="init()">
    
    <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-2xl w-full max-w-md relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
        
        <div class="text-center mb-8">
            <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-100 shadow-inner">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Kata Sandi Baru</h1>
            <p class="text-sm text-gray-500 mt-2">Silakan buat kata sandi baru untuk mengamankan kembali akun Anda.</p>
        </div>

        <div x-show="invalidUrl" x-cloak class="p-4 mb-6 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm text-center font-medium">
            Tautan reset tidak valid atau tidak lengkap. Silakan minta tautan baru dari halaman Lupa Password.
        </div>

        <form @submit.prevent="submit()" x-show="!invalidUrl && !status.success" x-cloak>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Kata Sandi Baru</label>
                <input type="password" x-model="newPassword" placeholder="Minimal 6 karakter" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white transition outline-none text-sm font-medium" required>
            </div>
            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Ulangi Kata Sandi</label>
                <input type="password" x-model="confirmPassword" placeholder="Ketik ulang kata sandi" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white transition outline-none text-sm font-medium" required>
            </div>

            <button type="submit" :disabled="isLoading" class="w-full bg-blue-600 text-white py-3.5 px-4 rounded-xl hover:bg-blue-700 font-semibold transition flex justify-center items-center shadow-lg shadow-blue-600/30 disabled:opacity-70">
                <span x-show="!isLoading">Simpan Password Baru</span>
                <svg x-show="isLoading" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>

        <div x-show="status.message" x-cloak class="mt-6 p-4 rounded-xl border text-sm text-center" :class="status.success ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-red-50 border-red-200 text-red-700'">
            <p class="font-medium" x-text="status.message"></p>
        </div>

        <div class="text-center mt-8">
            <a href="index.html" class="text-sm font-semibold text-gray-500 hover:text-blue-600 transition flex items-center justify-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kembali ke Login
            </a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
