<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - S-Tools ID</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style> 
        body { font-family: 'Poppins', sans-serif; } 
        [x-cloak] { display: none !important; } 
    </style>

    <script src="js/main.js" defer></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800" x-data="forgotPasswordApp()">
    
    <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-2xl w-full max-w-md relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
        
        <div class="text-center mb-8">
            <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-100 shadow-inner">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Pulihkan Akses</h1>
            <p class="text-xs text-gray-500 mt-2 leading-relaxed px-2">Masukkan email terdaftar Anda. Kami akan mengirimkan tautan aman untuk mereset kata sandi.</p>
        </div>

        <form @submit.prevent="submit()" x-show="!status.success">
            <div class="mb-6 text-left">
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Alamat Email</label>
                <input id="forgot-email" type="email" x-model="email" placeholder="Masukkan email terdaftar Anda" 
                       class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition outline-none text-sm font-medium text-gray-700" required>
            </div>

            <button type="submit" :disabled="isLoading" 
                    class="w-full bg-blue-600 text-white py-3.5 px-4 rounded-xl hover:bg-blue-700 font-semibold transition flex justify-center items-center shadow-lg shadow-blue-600/20 disabled:opacity-70 text-sm">
                <span x-show="!isLoading">Kirim Tautan Reset</span>
                <svg x-show="isLoading" x-cloak class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div x-show="status.message" x-cloak class="mt-4 p-4 rounded-xl border text-xs text-center font-medium leading-relaxed" 
             :class="status.success ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-red-50 border-red-200 text-red-700'">
            <span x-text="status.message"></span>
        </div>

        <div class="text-center mt-8">
            <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-blue-600 transition flex items-center justify-center gap-1.5 uppercase tracking-wider">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Kembali ke Login
            </a>
        </div>
    </div>

</body>
</html>
