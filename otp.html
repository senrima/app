<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi OTP - Senrima Tools</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; } [x-cloak] { display: none !important; } </style>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4" 
      x-data="otpApp()" 
      x-init="init(); darkMode = localStorage.getItem('theme') === 'dark'; if(darkMode) document.documentElement.classList.add('dark');"
      @show-toast.window="addToast($event.detail.message, $event.detail.type)">

    <div class="fixed top-4 right-4 left-4 sm:left-auto sm:w-80 z-[100] flex flex-col gap-2 pointer-events-none">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible" x-transition.opacity.duration.300ms 
                 class="pointer-events-auto flex items-start gap-3 p-4 rounded-xl shadow-lg border backdrop-blur-md w-full"
                 :class="toast.type === 'error' ? 'bg-red-50/95 border-red-200 text-red-800 dark:bg-red-900/95 dark:border-red-800 dark:text-red-100' : 'bg-white/95 border-gray-200 text-gray-800 dark:bg-slate-800/95 dark:border-slate-700 dark:text-slate-100'">
                <div class="flex-1 text-sm font-medium break-words" x-text="toast.message"></div>
                <button @click="removeToast(toast.id)" class="text-gray-400 hover:text-gray-600 transition p-0.5">&times;</button>
            </div>
        </template>
    </div>

    <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transition-colors duration-300 border border-gray-100 dark:border-slate-700">
        
        <h1 class="text-2xl font-bold text-gray-800 dark:text-slate-100">Verifikasi Akun</h1>
        <p class="text-sm text-gray-500 dark:text-slate-400 mt-2 mb-8">Masukkan 6 digit kode OTP yang kami kirim ke alamat email / Telegram Anda.</p>
        
        <form @submit.prevent="submit()" x-show="!isBlocked" x-transition>
            <div class="mb-6">
                <input id="otp-code" type="text" x-model="otp" maxlength="6" 
                       class="w-full p-3 text-center text-3xl tracking-[0.5em] font-semibold border border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
            </div>
            <button type="submit" :disabled="isLoading" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-md flex justify-center items-center">
                <span x-show="!isLoading">Verifikasi Sekarang</span>
                <svg x-show="isLoading" class="animate-spin h-5 w-5 ml-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>

        <div x-show="status.message" x-cloak class="mt-5 p-4 rounded-xl border-l-4 text-sm text-left shadow-sm" 
             :class="status.success ? 'bg-green-50 border-green-500 text-green-800 dark:bg-green-900/30 dark:text-green-300' : 'bg-red-50 border-red-500 text-red-800 dark:bg-red-900/30 dark:text-red-300'">
            <span class="font-medium" x-text="status.message"></span>
        </div>

        <div x-show="isBlocked" x-cloak class="mt-6" x-transition>
            <a href="index.html" class="w-full inline-flex justify-center items-center bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-gray-800 dark:text-white font-semibold py-3 px-4 rounded-xl transition shadow-sm">
                Kembali ke Halaman Login
            </a>
        </div>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
